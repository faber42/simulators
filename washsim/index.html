<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waschtrockner-Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Waschtrockner-Simulator</h1>
        <div id="main">
            <canvas id="canvas" width="940" height="730"></canvas>
            <div id="sidebar">
                <div id="controls">
                    <h3>Steuerung</h3>
                    <button id="powderBtn" class="wide-btn">🧂 Waschmittel einfüllen</button>
                    <button id="startBtn" class="wide-btn primary">▶ Programm starten</button>
                    <div class="control-group">
                        <label>Geschwindigkeit: <span id="speedVal">1x</span></label>
                        <input type="range" id="speedSlider" min="1" max="4" value="1" step="1">
                    </div>
                    <button id="resetBtn" class="wide-btn">Reset</button>
                </div>
                <div id="program">
                    <h3>Programmablauf</h3>
                    <ul id="phaseList"></ul>
                    <div id="phaseDesc">Waschmittel einfüllen und Programm starten.</div>
                </div>
                <div id="stats">
                    <h3>Status</h3>
                    <div class="stat-row"><span>Phase:</span><span id="statPhase">Bereit</span></div>
                    <div class="stat-row"><span>Restzeit:</span><span id="statTime">&ndash;</span></div>
                    <div class="stat-row"><span>Trommel:</span><span id="statRpm">0 U/min</span></div>
                    <div class="stat-row"><span>Temperatur:</span><span id="statTemp">20 °C</span></div>
                    <div class="stat-row"><span>Wasser im Gerät:</span><span id="statWater">0,0 l</span></div>
                    <div class="stat-row"><span>Wäsche:</span><span id="statLaundry">trocken</span></div>
                </div>
            </div>
        </div>
    </div>
    <script src="matter.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
