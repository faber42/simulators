<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nixie-Uhr</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        overflow: hidden;
        background:
            radial-gradient(80% 60% at 50% 62%, #221a16 0%, #14100e 55%, #0a0908 100%);
        display: flex; align-items: center; justify-content: center;
    }
    .back {
        position: fixed; top: 1rem; left: 1rem; z-index: 10;
        color: #e8ddd0; background: rgba(25,18,14,0.65);
        padding: 0.4rem 0.75rem; border-radius: 999px;
        text-decoration: none; font-size: 0.85rem;
        border: 1px solid rgba(255,200,150,0.1);
    }
    .back:hover { background: rgba(45,32,24,0.85); }

    .clock { position: relative; }

    .tubes {
        position: relative;
        display: flex; align-items: flex-end; gap: 1.6vmin;
        padding: 0 3vmin;
        z-index: 2;
    }
    .tube {
        position: relative;
        width: 11.5vmin; height: 27vmin;
    }
    .glass {
        position: absolute; inset: 0;
        border-radius: 5.5vmin 5.5vmin 1.6vmin 1.6vmin;
        background:
            linear-gradient(105deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.015) 18%, rgba(255,255,255,0) 40%),
            linear-gradient(180deg, rgba(120,90,80,0.10), rgba(60,40,35,0.16) 70%, rgba(35,22,18,0.3));
        box-shadow:
            inset 0 0 1.2vmin rgba(255,190,130,0.10),
            inset 0.3vmin 0 1vmin rgba(255,255,255,0.05),
            inset -0.5vmin -0.4vmin 1.4vmin rgba(0,0,0,0.4);
        overflow: hidden;
    }
    /* Glaskuppel-Glanzpunkt */
    .glass::before {
        content: '';
        position: absolute; top: 1vmin; left: 22%; width: 30%; height: 7%;
        border-radius: 50%;
        background: radial-gradient(50% 50% at 50% 50%, rgba(255,255,255,0.30), rgba(255,255,255,0) 75%);
        transform: rotate(-14deg);
    }
    /* Anodengitter */
    .mesh {
        position: absolute; inset: 8% 10% 6%;
        background:
            repeating-linear-gradient(0deg,  rgba(80,60,50,0.24) 0 1px, transparent 1px 0.85vmin),
            repeating-linear-gradient(90deg, rgba(80,60,50,0.24) 0 1px, transparent 1px 0.85vmin);
        border-radius: 4vmin 4vmin 1vmin 1vmin;
        pointer-events: none;
        z-index: 5;
        opacity: 0.75;
    }
    .digit {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Segoe UI Light', 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-weight: 200;
        font-size: 16.5vmin;
        line-height: 1;
        padding-top: 2vmin;
        font-variant-numeric: tabular-nums;
        user-select: none;
    }
    /* unbeheizte Kathoden hinter der Ziffer */
    .stack .digit { color: rgba(140,90,70,0.13); }
    .stack .digit:nth-child(2n) { transform: translate(0.12vmin, -0.06vmin); }
    .stack .digit:nth-child(3n) { transform: translate(-0.10vmin, 0.08vmin); }
    /* die glühende Kathode */
    .digit.lit {
        color: #ffc98f;
        z-index: 3;
        text-shadow:
            0 0 0.5vmin #ffb163,
            0 0 1.4vmin rgba(255,140,50,0.95),
            0 0 3.6vmin rgba(255,110,30,0.55),
            0 0 7vmin rgba(255,90,20,0.30);
    }
    .digit.lit.fadeout { transition: opacity 0.10s; opacity: 0; }
    /* Drahtkathoden vor der Ziffer (Silhouetten) */
    .fore .digit { color: rgba(30,16,12,0.22); z-index: 4; }

    .halo {
        position: absolute; inset: -20% -35%;
        background: radial-gradient(50% 42% at 50% 55%, rgba(255,130,40,0.16), rgba(255,130,40,0) 70%);
        z-index: 1;
        pointer-events: none;
    }
    .collar {
        position: absolute; left: 8%; right: 8%; bottom: -2.6vmin; height: 3.6vmin;
        border-radius: 0.7vmin;
        background: linear-gradient(180deg, #3a3a40, #1c1c22 60%, #101014);
        box-shadow: 0 0.4vmin 0.9vmin rgba(0,0,0,0.6), inset 0 0.2vmin 0.3vmin rgba(255,255,255,0.10);
    }

    .sep {
        position: relative;
        width: 3.6vmin; height: 27vmin;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 4.5vmin;
        padding-bottom: 2vmin;
    }
    .sep i {
        width: 1.7vmin; height: 1.7vmin; border-radius: 50%;
        background: #ffc98f;
        box-shadow:
            0 0 0.6vmin #ffb163,
            0 0 1.8vmin rgba(255,140,50,0.9),
            0 0 4vmin rgba(255,110,30,0.45);
        animation: neonpulse 2s ease-in-out infinite;
    }
    @keyframes neonpulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
    }

    .base {
        position: relative;
        margin-top: 4vmin;
        height: 7vmin;
        border-radius: 1.6vmin;
        background:
            linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0) 22%),
            repeating-linear-gradient(93deg, rgba(0,0,0,0.10) 0 0.5vmin, rgba(0,0,0,0) 0.5vmin 1.6vmin),
            linear-gradient(180deg, #6b4726 0%, #4c3018 55%, #331f0e 100%);
        box-shadow:
            0 2.6vmin 5vmin rgba(0,0,0,0.7),
            inset 0 -1vmin 2vmin rgba(0,0,0,0.5);
        z-index: 0;
    }
    /* warmer Lichtschein der Röhren auf dem Holz */
    .base::before {
        content: '';
        position: absolute; left: 4%; right: 4%; top: -1.2vmin; height: 3vmin;
        background: radial-gradient(60% 100% at 50% 0%, rgba(255,140,50,0.28), rgba(255,140,50,0) 80%);
        border-radius: 50%;
    }
    .plate {
        position: absolute; right: 3vmin; bottom: 1.7vmin;
        color: rgba(255,220,180,0.35);
        font-size: 1.5vmin; letter-spacing: 0.4em;
        user-select: none;
    }

    .caption {
        position: fixed; bottom: 1.1rem; left: 0; right: 0;
        text-align: center;
        color: rgba(220,190,160,0.4);
        font-size: 0.8rem;
        pointer-events: none;
    }
</style>
</head>
<body>
    <a class="back" href="../">&larr; Uhrengalerie</a>

    <div class="clock">
        <div class="tubes" id="tubes"></div>
        <div class="base"><div class="plate">IN-14</div></div>
    </div>
    <div class="caption">Sechs Glimmr&ouml;hren: Vor und hinter der gl&uuml;henden Kathode stehen die dunklen Drahtziffern der &uuml;brigen Kathoden im Stapel.</div>

<script>
(() => {
'use strict';

// ============================================================================
// Nixie-Uhr — sechs Röhren (HH MM SS) mit Glimmentladungs-Look
//  - Pro Röhre: Stapel unbeheizter Kathoden hinten, glühende Ziffer,
//    Drahtsilhouetten davor, Anodengitter, Glasreflexe.
//  - Leichtes Flackern pro Röhre (geglättetes Rauschen), selten ein
//    kurzer Aussetzer wie bei alternden Röhren.
// ============================================================================

const tubesEl = document.getElementById('tubes');
const tubes = [];

function makeTube() {
    const t = document.createElement('div');
    t.className = 'tube';
    const stack = Array.from({ length: 10 }, (_, i) =>
        `<div class="digit">${i}</div>`).join('');
    t.innerHTML =
        '<div class="halo"></div>' +
        '<div class="glass">' +
            `<div class="stack">${stack}</div>` +
            '<div class="digit lit">0</div>' +
            '<div class="fore"><div class="digit">3</div><div class="digit" style="transform:translate(0.18vmin,0.1vmin)">7</div></div>' +
            '<div class="mesh"></div>' +
        '</div>' +
        '<div class="collar"></div>';
    tubesEl.appendChild(t);
    const lit = t.querySelector('.digit.lit');
    const halo = t.querySelector('.halo');
    return {
        el: t, lit, halo,
        value: null,
        fl: 1,              // Flacker-Level (geglättet)
        dropout: 0,         // Restdauer eines Aussetzers
        nextDropAt: performance.now() + 15000 + Math.random() * 45000,
    };
}
function makeSep() {
    const s = document.createElement('div');
    s.className = 'sep';
    s.innerHTML = '<i></i><i></i>';
    s.children[1].style.animationDelay = '-1s';
    tubesEl.appendChild(s);
}

for (let i = 0; i < 6; i++) {
    tubes.push(makeTube());
    if (i === 1 || i === 3) makeSep();
}

// ---- Ziffern setzen ----------------------------------------------------------
function setDigit(tube, v) {
    if (tube.value === v) return;
    tube.value = v;
    // kurzes Nachglimmen der alten Ziffer
    const old = tube.lit.cloneNode(true);
    tube.lit.parentNode.appendChild(old);
    requestAnimationFrame(() => old.classList.add('fadeout'));
    setTimeout(() => old.remove(), 200);
    tube.lit.textContent = v;
}

function update() {
    const now = new Date();
    const p2 = n => String(n).padStart(2, '0');
    const s = p2(now.getHours()) + p2(now.getMinutes()) + p2(now.getSeconds());
    for (let i = 0; i < 6; i++) setDigit(tubes[i], s[i]);
}
update();
setInterval(update, 200);

// ---- Flackern ------------------------------------------------------------------
let last = performance.now();
function flicker(now) {
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    for (const tube of tubes) {
        // geglättetes Zufallsrauschen um 1.0
        tube.fl += (Math.random() - 0.5) * dt * 6;
        tube.fl += (1 - tube.fl) * dt * 8;
        tube.fl = Math.max(0.86, Math.min(1.06, tube.fl));
        let level = tube.fl;

        if (tube.dropout > 0) {
            tube.dropout -= dt;
            level *= 0.35;
        } else if (now > tube.nextDropAt) {
            tube.dropout = 0.05 + Math.random() * 0.06;
            tube.nextDropAt = now + 15000 + Math.random() * 45000;
        }

        tube.lit.style.opacity = level.toFixed(3);
        tube.halo.style.opacity = (level * 0.95).toFixed(3);
    }
    requestAnimationFrame(flicker);
}
requestAnimationFrame(flicker);

})();
</script>
</body>
</html>
